services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-wallets_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-postgres} -d ${POSTGRES_TEST_DB:-wallets_test}"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@test-db:5432/wallets_test}
      DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@test-db:5432/wallets_test}
    command: ["pytest", "-q"]
